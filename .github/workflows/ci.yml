name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.2"
          - "3.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Print runtime diagnostics
        run: |
          ruby -v
          bundle -v

      - name: Run release verification
        run: bundle exec rake

      - name: Dump smoke logs on failure
        if: failure()
        shell: bash
        run: |
          if [ ! -d tmp/test ]; then
            echo "No tmp/test directory found."
            exit 0
          fi
          shopt -s nullglob
          found=false
          for file in tmp/test/*.log; do
            found=true
            echo "::group::${file}"
            cat "${file}"
            echo "::endgroup::"
          done
          if [ "${found}" = false ]; then
            echo "No smoke log files were generated."
          fi
