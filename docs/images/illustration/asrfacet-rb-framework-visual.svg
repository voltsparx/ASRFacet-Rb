<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="300" viewBox="0 0 1400 300" role="img" aria-labelledby="title desc">
  <title id="title">ASRFacet-Rb Simple Workflow</title>
  <desc id="desc">Simple workflow image showing the five framework stages.</desc>

  <rect width="1400" height="300" fill="#0f1720"/>
  <text x="40" y="50" fill="#eaf3ff" font-family="Arial, sans-serif" font-size="34" font-weight="700">ASRFacet-Rb Workflow</text>

  <g font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#eaf3ff" text-anchor="middle">
    <rect x="40" y="105" width="240" height="90" rx="10" fill="#173047" stroke="#2f5c87"/>
    <text x="160" y="158">Passive Discovery</text>

    <rect x="320" y="105" width="240" height="90" rx="10" fill="#173047" stroke="#2f5c87"/>
    <text x="440" y="158">Active Validation</text>

    <rect x="600" y="105" width="240" height="90" rx="10" fill="#173047" stroke="#2f5c87"/>
    <text x="720" y="158">Service + Web Map</text>

    <rect x="880" y="105" width="220" height="90" rx="10" fill="#173047" stroke="#2f5c87"/>
    <text x="990" y="158">Correlation</text>

    <rect x="1140" y="105" width="220" height="90" rx="10" fill="#173047" stroke="#2f5c87"/>
    <text x="1250" y="158">Tracking</text>
  </g>

  <g stroke="#57d7ff" stroke-width="4">
    <line x1="280" y1="150" x2="312" y2="150"/>
    <line x1="560" y1="150" x2="592" y2="150"/>
    <line x1="840" y1="150" x2="872" y2="150"/>
    <line x1="1100" y1="150" x2="1132" y2="150"/>
  </g>

  <g fill="#57d7ff">
    <polygon points="312,145 325,150 312,155"/>
    <polygon points="592,145 605,150 592,155"/>
    <polygon points="872,145 885,150 872,155"/>
    <polygon points="1132,145 1145,150 1132,155"/>
  </g>
</svg>
