<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ASRFacet-Rb Quick Command Cheat Sheet</title>
  <desc id="desc">A quick reference card with common ASRFacet-Rb commands for scan, passive, ports, dns, console, web session, and help topics.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#1b1f2a" />
    </linearGradient>
    <linearGradient id="head" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b0000" />
      <stop offset="100%" stop-color="#b22222" />
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />

  <rect x="40" y="36" width="1120" height="92" rx="12" fill="url(#head)" />
  <text x="72" y="86" fill="#f5f7fa" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700">
    ASRFacet-Rb Quick Command Cheat Sheet
  </text>
  <text x="72" y="114" fill="#f5f7fa" font-family="Consolas, Menlo, monospace" font-size="16">
    Authorized testing only. Run from managed install or with bundle exec in repo mode.
  </text>

  <g font-family="Consolas, Menlo, monospace" font-size="20" fill="#e6edf3">
    <rect x="40" y="154" width="1120" height="70" rx="10" fill="#111827" stroke="#30363d" />
    <text x="68" y="198">$ asrfacet-rb scan example.com --monitor --memory --format html</text>

    <rect x="40" y="238" width="1120" height="70" rx="10" fill="#111827" stroke="#30363d" />
    <text x="68" y="282">$ asrfacet-rb passive example.com --format json --output passive.json</text>

    <rect x="40" y="322" width="1120" height="70" rx="10" fill="#111827" stroke="#30363d" />
    <text x="68" y="366">$ asrfacet-rb ports api.example.com --ports top1000</text>

    <rect x="40" y="406" width="1120" height="70" rx="10" fill="#111827" stroke="#30363d" />
    <text x="68" y="450">$ asrfacet-rb dns example.com</text>

    <rect x="40" y="490" width="1120" height="70" rx="10" fill="#111827" stroke="#30363d" />
    <text x="68" y="534">$ asrfacet-rb --console    # Interactive shell</text>

    <rect x="40" y="574" width="1120" height="70" rx="10" fill="#111827" stroke="#30363d" />
    <text x="68" y="618">$ asrfacet-rb --web-session   # Local web control panel</text>
  </g>

  <text x="40" y="690" fill="#9ca3af" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    Tip: use "asrfrb" as a shorter alias. Use "asrfacet-rb --explain scope" for built-in guidance.
  </text>
</svg>
